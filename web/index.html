<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GO212 — La Super App 100% Marocaine">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="GO212">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GO212</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API — replace YOUR_API_KEY with your real key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg"></script>

  <style>
    #loading-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #052E16;
      position: fixed;
      top: 0; left: 0;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
      font-family: sans-serif;
      color: white;
    }
    #loading-screen h2 {
      font-size: 2rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: 2px;
    }
    #loading-screen p {
      font-size: 0.9rem;
      opacity: 0.7;
      margin: 0;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #4ADE80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.82;transform:scale(0.96);} }
  </style>
</head>
<body style="background-color: #052E16; margin: 0; padding: 0; overflow: hidden;">

  <div id="loading-screen">
    <img src="go212.png" alt="GO212" style="width:130px;height:auto;object-fit:contain;animation:pulse 1.6s ease-in-out infinite;border-radius:16px;" />
    <p>Chargement de l'application...</p>
  </div>

  <!-- Flutter 3.19.x bootstrap (uses flutter.js, not flutter_bootstrap.js) -->
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            useColorEmoji: true,
          }).then(function(appRunner) {
            const loading = document.getElementById('loading-screen');
            if (loading) {
              loading.style.transition = 'opacity 0.4s ease';
              loading.style.opacity = '0';
              setTimeout(() => loading.remove(), 400);
            }
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
