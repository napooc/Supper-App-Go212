<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GO212 — La Super App 100% Marocaine">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="go212">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>go212</title>
  <link rel="manifest" href="manifest.json">


</head>
<body style="background-color: #052E16; margin: 0; padding: 0; overflow: hidden;">
  <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif;">
    <div style="text-align: center;">
      <h2>GO212</h2>
      <p>Chargement de l'application...</p>
    </div>
  </div>

  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    window.addEventListener('load', function(ev) {
      console.log("Démarrage de l'initialisation Flutter...");
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          console.log("Entrypoint chargé, initialisation du moteur...");
          engineInitializer.initializeEngine({
            useColorEmoji: true
          }).then(function(appRunner) {
            console.log("Moteur initialisé, lancement de l'application...");
            // Retirer l'indicateur de chargement HTML
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            
            appRunner.runApp();
          }).catch(function(e) {
            console.error("Erreur d'initialisation du moteur:", e);
          });
        }
      });
    });
  </script>
</body>
</html>
