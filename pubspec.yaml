name: go212
description: "GO212 — La Super App 100% Marocaine"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  video_player: ^2.8.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/video/
