name: go212
description: "GO212 — La Super App 100% Marocaine"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  video_player: ^2.8.6
  image_picker: ^1.1.2
  intl: ^0.20.2
  flutter_rating_bar: ^4.0.1
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/go212.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/go212.png"
  windows:
    generate: true
    image_path: "assets/images/go212.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/video/
    - assets/images/gowash/
    - assets/images/gowash/packs/
    - assets/images/gowash/brands/
    - assets/images/videos/
    - assets/animations/
